<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verträge Management | Bandenwerbung Manager</title>
    <link rel="stylesheet" href="Verein.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-content">
                <div class="flex items-center gap-12">
                    <a href="Verein.html" class="nav-brand">
                        <span class="text-2xl">🏟️</span>
                        <span class="hidden sm:inline">Manager</span>
                    </a>
                    <div class="nav-links">
                        <a href="VereinSuche.html" class="nav-link">Vereinssuche</a>
                        <a href="javascript:switchPage('firma')" class="nav-link">Bandenpläne</a>
                        <a href="Verein.html" class="nav-link active">Verträge</a>
                        <a href="Anfragen.html" class="nav-link">Anfragen</a>
                        <a href="BandeDesign.html" class="nav-link">Design</a>
                    </div>
                </div>
                <div class="nav-actions">
                    <span class="user-badge">
                        <span>⚽</span> Verein
                    </span>
                    <button onclick="logout()" class="btn btn-danger">
                        Abmelden
                    </button>
                </div>
                <!-- Mobile Menu -->
                <div class="sm:hidden">
                    <select onchange="handleMobileNav(this.value)" class="form-input text-sm">
                        <option value="">Menü</option>
                        <option value="VereinSuche.html">Vereinssuche</option>
                        <option value="Verein.html" selected>Verträge</option>
                        <option value="firma">Bandenpläne</option>
                        <option value="Anfragen.html">Anfragen</option>
                        <option value="BandeDesign.html">Design</option>
                        <option value="logout">Abmelden</option>
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <main class="container" style="padding-top: 1rem; padding-bottom: 2rem;">
        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">Verträge</h1>
            <p class="text-gray-600">Verwalten Sie Ihre Geschäftsbeziehungen und Verträge</p>
        </header>

        <!-- Collapsible Stats Box -->
        <section class="mb-8">
            <button id="statsToggle" class="card w-full flex items-center justify-between p-4 hover:shadow-md">
                <div class="flex items-center gap-3">
                    <span class="text-gray-700 font-semibold">📊 Übersicht</span>
                    <svg id="statsIcon" class="w-5 h-5 text-gray-600 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                    </svg>
                </div>
            </button>
            
            <div id="statsContent" class="stats-grid">
                <div class="stat-card">
                    <p class="stat-label">Aktive Verträge</p>
                    <p class="stat-value" id="active-count">0</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Gesamtvolumen</p>
                    <p class="stat-value text-blue-600" id="total-volume">0 €</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Nächste Verlängerung</p>
                    <p class="stat-value text-green-600" id="next-renewal">-</p>
                </div>
            </div>
        </section>

        <!-- Sorting Controls -->
        <div class="mb-6 flex gap-3">
            <button id="sortLaufzeit" class="btn btn-primary">
                Nach Laufzeit ↓
            </button>
            <button id="sortBetrag" class="btn btn-secondary">
                Nach Betrag ↓
            </button>
        </div>
        
        <!-- Contracts Grid -->
        <section class="category-section grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></section>
    </main>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 class="text-2xl font-bold text-gray-900" id="modal-name"></h2>
                    <p class="text-gray-600 text-sm mt-1" id="modal-status"></p>
                </div>
                <button onclick="closeModal()" class="modal-close">&times;</button>
            </div>
            
            <div class="modal-body space-y-6">
                <div>
                    <p class="stat-label mb-2">Vertragsbetrag</p>
                    <p class="text-3xl font-bold text-blue-600" id="modal-betrag"></p>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <p class="stat-label mb-2">Laufzeitende</p>
                        <p class="text-lg font-semibold text-gray-900" id="modal-laufzeit"></p>
                    </div>
                    <div>
                        <p class="stat-label mb-2">Status</p>
                        <p class="inline-block px-3 py-1 rounded-full text-sm font-medium" id="modal-status-badge"></p>
                    </div>
                </div>

                <div id="modal-details" class="pt-4 border-t border-gray-200 space-y-3"></div>
                
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="btn btn-secondary flex-1">Schließen</button>
                    <button class="btn btn-primary flex-1">Bearbeiten</button>
                </div>
            </div>
        </div>
    </div>

    <script src="vereinScript.js"></script>
    <script>
        // Login-Check
        if (!localStorage.getItem('loggedInUser')) {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('userType');
            localStorage.removeItem('loggedInUser');
            window.location.href = 'index.html';
        }

        function switchPage(pageType) {
            localStorage.setItem('userType', pageType);
            if (pageType === 'firma') {
                window.location.href = 'Bandenseite.html';
            }
        }

        function handleMobileNav(value) {
            if (value === 'logout') {
                logout();
            } else if (value === 'firma') {
                switchPage('firma');
            } else if (value) {
                window.location.href = value;
            }
        }
    </script>

</body>
</html>
