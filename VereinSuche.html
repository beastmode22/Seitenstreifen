<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vereinssuche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f4f4f4; }
        .container { max-width: 500px; margin: 40px auto; background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 2px 8px #0001; }
        .search-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1.1em; }
        .verein-list { margin-top: 24px; }
        .verein-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .verein-name { font-weight: bold; font-size: 1.1em; }
        .verein-city { color: #555; font-size: 0.95em; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-2xl font-bold mb-6 text-center">Verein oder Stadt suchen</h2>
        <input id="searchInput" class="search-input" type="text" placeholder="Verein oder Stadt eingeben...">
        <div id="vereinList" class="verein-list"></div>
        <div id="map" style="height: 350px; width: 100%; margin-top: 32px; border-radius: 10px; overflow: hidden;"></div>
    </div>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Login-Check
        if (!localStorage.getItem('loggedInUser')) {
            window.location.href = 'index.html';
        }
        // Dummy-Vereine inkl. 3 in Augsburg
        // Städte mit Koordinaten
        const staedte = {
            'Augsburg': { lat: 48.366512, lng: 10.894446, zoom: 12 },
            'Nürnberg': { lat: 49.4521, lng: 11.0767, zoom: 12 },
            'München': { lat: 48.1371, lng: 11.5754, zoom: 12 }
        };
        // Vereine mit Stadt und Koordinaten
        const vereine = [
            { name: 'FC Augsburg', city: 'Augsburg', email: 'info@fcaugsburg.de', lat: 48.3461, lng: 10.8985 },
            { name: 'SV Augsburg Süd', city: 'Augsburg', email: 'kontakt@svaugsburgsued.de', lat: 48.3325, lng: 10.9152 },
            { name: 'TSV Augsburg Nord', city: 'Augsburg', email: 'mail@tsvaugsburgnord.de', lat: 48.3705, lng: 10.8978 },
            { name: 'FC Nürnberg', city: 'Nürnberg', email: 'info@fcn.de', lat: 49.4236, lng: 11.0767 },
            { name: 'TSV Nürnberg Ost', city: 'Nürnberg', email: 'kontakt@tsvno.de', lat: 49.4645, lng: 11.1182 },
            { name: 'SV Nürnberg West', city: 'Nürnberg', email: 'mail@svnwest.de', lat: 49.4412, lng: 11.0246 },
            { name: 'FC Bayern München', city: 'München', email: 'info@fcbayern.de', lat: 48.2188, lng: 11.6247 },
            { name: 'TSV 1860 München', city: 'München', email: 'kontakt@tsv1860.de', lat: 48.1147, lng: 11.5215 },
            { name: 'SV München Süd', city: 'München', email: 'mail@svmsued.de', lat: 48.1025, lng: 11.6012 }
        ];
        const searchInput = document.getElementById('searchInput');
        const vereinList = document.getElementById('vereinList');
        function renderVereine(list) {
            vereinList.innerHTML = '';
            if (list.length === 0) {
                vereinList.innerHTML = '<div class="text-gray-500 text-center mt-8">Keine Vereine gefunden.</div>';
                return;
            }
            list.forEach(v => {
                const card = document.createElement('div');
                card.className = 'verein-card';
                card.innerHTML = `<div class=\"verein-name\">${v.name}</div><div class=\"verein-city\">${v.city}</div><div class=\"text-xs text-gray-400 mt-1\">${v.email}</div>`;
                card.style.cursor = 'pointer';
                card.onclick = () => {
                    window.location.href = `Bandenseite.html?verein=${encodeURIComponent(v.name)}`;
                };
                vereinList.appendChild(card);
            });
        }
        function filterVereine() {
            const q = searchInput.value.trim().toLowerCase();
            if (!q) {
                renderVereine([]);
                updateMap([], null);
                return;
            }
            const filtered = vereine.filter(v => v.name.toLowerCase().includes(q) || v.city.toLowerCase().includes(q));
            renderVereine(filtered);
            // Karte zentrieren: auf Verein, dann Stadt, sonst Augsburg
            let center = null;
            if (filtered.length === 1 && filtered[0].lat && filtered[0].lng) {
                center = { lat: filtered[0].lat, lng: filtered[0].lng, zoom: 14 };
            } else if (filtered.length > 0) {
                // Prüfe, ob alle aus einer Stadt mit Koordinaten
                const stadt = filtered[0].city;
                if (staedte[stadt]) {
                    center = staedte[stadt];
                }
            }
            updateMap(filtered, center);
        }
        searchInput.addEventListener('input', filterVereine);
        // Leaflet Map
        let map, markers = [];
        function initMap() {
            map = L.map('map').setView([48.366512, 10.894446], 12); // Standard: Augsburg
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 18,
                attribution: '© OpenStreetMap'
            }).addTo(map);
            updateMap(vereine.filter(v => v.city === 'Augsburg'), staedte['Augsburg']);
        }
        function updateMap(list, center) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            list.filter(v => v.lat && v.lng).forEach(v => {
                const marker = L.marker([v.lat, v.lng]).addTo(map);
                marker.bindPopup(`<b>${v.name}</b><br>${v.city}`);
                marker.on('click', () => {
                    window.location.href = `Bandenseite.html?verein=${encodeURIComponent(v.name)}`;
                });
                markers.push(marker);
            });
            if (center && center.lat && center.lng) {
                map.setView([center.lat, center.lng], center.zoom || 12);
            }
        }
        window.onload = initMap;
    </script>
</body>
</html>
