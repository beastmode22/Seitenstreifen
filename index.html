<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandenwerbung Manager - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            text-align: center;
            color: white;
        }
        
        .login-btn {
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            width: 100%;
            text-align: center;
        }
        
        .login-btn-verein {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .login-btn-verein:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .login-btn-firma {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .login-btn-firma:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.4);
        }
    </style>
</head>
<body>

    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="login-card w-full max-w-md">
            <!-- Header -->
            <div class="login-header">
                <h1 class="text-4xl font-bold mb-2">🏟️ Manager</h1>
                <p class="text-blue-100">Bandenwerbung Verwaltungssystem</p>
            </div>
            <!-- Content -->
            <div class="p-8">
                <h2 class="text-2xl font-bold text-gray-900 mb-2 text-center">Login</h2>
                <p class="text-gray-600 text-center mb-8">Bitte wählen Sie einen Test-User:</p>
                <form id="loginForm" class="space-y-6">
                    <div>
                        <label for="userSelect" class="block text-sm font-medium text-gray-700 mb-1">Benutzer</label>
                        <select id="userSelect" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Passwort</label>
                        <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Passwort" required>
                        <p class="text-xs text-gray-400 mt-1">(Für alle User: <b>test</b>)</p>
                    </div>
                    <button type="submit" class="login-btn login-btn-verein w-full">Login</button>
                    <div id="loginError" class="text-red-600 text-sm mt-2 hidden text-center">Falsches Passwort!</div>
                </form>
                <div class="mt-8 pt-8 border-t border-gray-200">
                    <p class="text-xs text-gray-500 text-center">
                        Dieses System verwaltet die Bandenwerbung an Stadien.<br>
                        Test-User werden beim ersten Laden automatisch angelegt.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dummy-User initialisieren (nur beim ersten Laden)
        if (!localStorage.getItem('dummyUsers')) {
            const dummyUsers = [
                { id: 1, type: 'kunde', name: 'Max Mustermann', email: 'max@kunde.de', password: 'test' },
                { id: 2, type: 'kunde', name: 'Erika Musterfrau', email: 'erika@kunde.de', password: 'test' },
                { id: 3, type: 'verein', name: 'FC Teststadt', email: 'info@fcteststadt.de', password: 'test' },
                { id: 4, type: 'verein', name: 'SV Beispiel', email: 'kontakt@svbeispiel.de', password: 'test' }
            ];
            localStorage.setItem('dummyUsers', JSON.stringify(dummyUsers));
        }

        // Prüfe beim Laden, ob der Benutzer bereits eingeloggt ist
        window.addEventListener('load', function() {
            const loggedInUser = localStorage.getItem('loggedInUser');
            if (loggedInUser) {
                const user = JSON.parse(loggedInUser);
                if (user.type === 'verein') {
                    window.location.href = 'Verein.html';
                } else if (user.type === 'kunde') {
                    window.location.href = 'VereinSuche.html';
                }
            }
            // Fülle das Dropdown mit Usern
            const users = JSON.parse(localStorage.getItem('dummyUsers'));
            const userSelect = document.getElementById('userSelect');
            users.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u.id;
                opt.textContent = `${u.name} (${u.type === 'verein' ? 'Verein' : 'Kunde'})`;
                userSelect.appendChild(opt);
            });
        });

        // Login-Formular-Logik
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            if (!loginForm) return;
            loginForm.onsubmit = function(e) {
                e.preventDefault();
                const users = JSON.parse(localStorage.getItem('dummyUsers'));
                const userId = parseInt(document.getElementById('userSelect').value);
                const password = document.getElementById('password').value;
                const user = users.find(u => u.id === userId);
                if (user && password === user.password) {
                    localStorage.setItem('loggedInUser', JSON.stringify(user));
                    localStorage.setItem('userType', user.type);
                    if (user.type === 'verein') {
                        window.location.href = 'Verein.html';
                    } else if (user.type === 'kunde') {
                        window.location.href = 'VereinSuche.html';
                    }
                } else {
                    document.getElementById('loginError').classList.remove('hidden');
                }
            };
        });
    </script>
</body>
</html>
